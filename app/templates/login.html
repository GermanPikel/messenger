<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', path='auth.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-panel" aria-labelledby="login-title">
            <div class="auth-header">
                <p class="eyebrow">Messenger</p>
                <h1 id="login-title">Войти</h1>
            </div>

            <form id="login-form" class="auth-form">
                <label>
                    Username
                    <input name="username" type="text" autocomplete="username" required>
                </label>

                <label>
                    Password
                    <input name="password" type="password" autocomplete="current-password" required>
                </label>

                <button type="submit">Войти</button>
            </form>

            <p id="message" class="message" role="status" aria-live="polite"></p>

            <div id="token-box" class="token-box" hidden>
                <p>Access token сохранён в localStorage.</p>
                <button id="refresh-button" type="button">Обновить access token</button>
            </div>

            <p class="auth-link">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </p>
        </section>
    </main>

    <script>
        const form = document.querySelector("#login-form");
        const message = document.querySelector("#message");
        const tokenBox = document.querySelector("#token-box");
        const refreshButton = document.querySelector("#refresh-button");

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        function saveTokens(data) {
            localStorage.setItem("access_token", data.access_token);
            localStorage.setItem("refresh_token", data.refresh_token);
            tokenBox.hidden = false;
        }

        if (localStorage.getItem("access_token") && localStorage.getItem("refresh_token")) {
            tokenBox.hidden = false;
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            showMessage("", "");

            const formData = new FormData(form);
            const body = new URLSearchParams();
            body.set("username", formData.get("username"));
            body.set("password", formData.get("password"));

            const response = await fetch("/users/token", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body,
            });

            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                showMessage(error.detail || "Неверный username или пароль", "error");
                return;
            }

            const data = await response.json();
            saveTokens(data);
            showMessage("Вход выполнен.", "success");
            form.reset();
        });

        refreshButton.addEventListener("click", async () => {
            const refreshToken = localStorage.getItem("refresh_token");

            if (!refreshToken) {
                showMessage("Refresh token не найден. Войдите заново.", "error");
                tokenBox.hidden = true;
                return;
            }

            const response = await fetch("/users/refresh-token", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({refresh_token: refreshToken}),
            });

            if (!response.ok) {
                localStorage.removeItem("access_token");
                localStorage.removeItem("refresh_token");
                tokenBox.hidden = true;
                showMessage("Сессия истекла. Войдите заново.", "error");
                return;
            }

            const data = await response.json();
            saveTokens(data);
            showMessage("Access token обновлён.", "success");
        });
    </script>
</body>
</html>
